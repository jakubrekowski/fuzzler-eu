version: '3'

services:
  payload:
    image: oven/bun:1.1-alpine
    ports:
      - '3000:3000'
    volumes:
      - .:/home/bun/app
      - /home/bun/app/node_modules
    working_dir: /home/bun/app/
    command: sh -c "bun install && bun dev"
    depends_on:
      - db
    env_file:
      - .env

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fuzzler-eu
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
